<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>The Chaunce of the Dyse</title>
    <script src="https://unpkg.com/ceteicean/dist/browser/CETEI.js"></script>
    <style>
        /* Basic styling for the poem */
        body { font-family: 'Georgia', serif; line-height: 1.6; padding: 40px; background: #fdfdfd; }
        tei-title { display: block; font-size: 2em; font-weight: bold; margin-bottom: 20px; text-align: center; }
        tei-lg { display: block; margin-bottom: 1.5em; } /* Line groups (stanzas) */
        tei-l { display: block; margin-left: 20px; }    /* Individual lines */
    </style>
</head>
<body>

    <div id="tei-container">
        <p>Loading the poem...</p>
    </div>

    <script>
        const c = new CETEI();
        // This fetches your specific XML file from the repository
        c.getHTML5("hammond-transcription-tei.xml", function(data) {
            document.getElementById("tei-container").innerHTML = "";
            document.getElementById("tei-container").appendChild(data);
        });
    </script>

</body>
</html>
