<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>The Chaunce of the Dyse</title>
    <script src="https://cdn.jsdelivr.net/npm/ceteicean@1.6.0/dist/browser/CETEI.js"></script>
    <style>
    body { 
        font-family: 'Georgia', serif; 
        line-height: 1.6; 
        padding: 40px; 
        background: #fdfdfd; 
    }
    /* Hide the TEI Header (metadata) so it doesn't block the view */
    tei-teiheader { 
        display: none; 
    }
    /* Ensure the body and poem lines are visible */
    tei-body { 
        display: block; 
    }
    tei-lg { 
        display: block; 
        margin-bottom: 2em; 
    }
    tei-l { 
        display: block; 
        margin-left: 20px; 
    }
    </style>
</head>
<body>

    <div id="tei-container">
        <p>Loading the poem...</p>
    </div>

    <script>
        const c = new CETEI();
        // This fetches your specific XML file from the repository
        c.getHTML5("hammond-transcription-tei.xml", function(data) {
            document.getElementById("tei-container").innerHTML = "";
            document.getElementById("tei-container").appendChild(data);
        });
    </script>

</body>
</html>
